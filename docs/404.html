<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — BerestaEngine Lite</title>
  <meta name="robots" content="noindex">
  <!-- 301-style JS redirect for common moved pages -->
  <script>
    const redirects = {
      '/docs/api/game-object.html': '/docs/api/gameobject.html',
      '/docs/api/game-scene.html':  '/docs/api/gamescene.html',
      '/docs/start.html':           '/docs/getting-started.html',
    };
    const dest = redirects[location.pathname];
    if (dest) location.replace(dest);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../docs.css">
</head>

  <h1 style="font-size:2rem;margin-bottom:.75rem">404 — Page Not Found</h1>
  <p style="color:var(--text2);margin-bottom:2rem">This page doesn't exist or was moved.</p>
  <div class="cta-group" style="justify-content:center">
    <a href="../index.html" class="btn btn-primary">← Go Home</a>
    <a href="../getting-started.html" class="btn btn-secondary">Getting Started</a>

</html>
