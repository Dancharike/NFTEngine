<!DOCTYPE html>
<html>
    <head>
        <title>NFT Engine</title>
        <style>
            * {margin: 0; padding: 0;}
            html, body {width: 100%; height: 100%; overflow: hidden;}
        </style>
    </head>
    <body>
        <div id="gameArea">
            <canvas id="viewport"></canvas>
        </div>
        
        <div id="debug-console">
            <div id="debug-console-header">
                <span>Debug Console</span>
                <button id="debug-console-close">✕</button>
            </div>
            <div id="debug-console-history"></div>
            <div id="debug-console-input-row">
                <span class="prompt">&gt;</span>
                <input id="debug-console-input" type="text" autocomplete="off" spellcheck="false" />
            </div>
            <div id="debug-console-suggestions"></div>
        </div>

        <div id="fps-widget"></div>
        <div id="fps-graph-widget">
            <canvas id="fps-graph-canvas" width="200" height="60"></canvas>
        </div>
    </body>
</html>
